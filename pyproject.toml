[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "cosmo"
version = "0.1.0"
description = "COSMO conversion tools (OpenLABEL -> OSI/MCAP + Omega-Prime CSV) with GUI"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy",
  "pandas",
  "pillow",
  "matplotlib",
]

[project.optional-dependencies]
gui = ["PyQt5>=5.15"]
mcap = ["betterosi"]
plot = ["omega-prime", "altair"]
dev = ["pytest", "ruff", "pre-commit"]
docs = ["mkdocs-material", "mkdocstrings[python]"]
gui-fallback = ["PySide6", "PyQt6"]

[project.scripts]
cosmo = "cosmo.cli.main:main"
cosmo-gui = "cosmo.cli.gui:main"
cosmo-convert = "cosmo.cli.convert:main"
cosmo-calibrate = "cosmo.cli.calibrate:main"

[tool.hatch.build]
include = [
  "src/cosmo/**/*.py",
  "src/cosmo/schemas/**/*",
  "src/cosmo/assets/**/*",
]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-select = ["I", "F", "E", "W"]
