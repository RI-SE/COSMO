<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <style>
      .cyan { stroke:#22D3EE; fill:none; }
      .blue { stroke:#3B82F6; fill:none; }
      .white { stroke:#E5E7EB; fill:none; }
      .slate { stroke:#94A3B8; fill:none; }
      .txt { fill:#E5E7EB; font-family: 'DejaVu Sans Mono', ui-monospace, monospace; font-size:46px; letter-spacing:2px; }
    </style>
  </defs>
  <!-- hexagon -->
  <polygon points="256,46 438,151 438,361 256,466 74,361 74,151" class="cyan" stroke-width="6" />
  <!-- inner ring -->
  <circle cx="256" cy="256" r="170" class="white" stroke-width="4" />
  <!-- crosshair -->
  <line x1="256" y1="94" x2="256" y2="418" class="slate" stroke-width="2" />
  <line x1="94" y1="256" x2="418" y2="256" class="slate" stroke-width="2" />
  <!-- orbits -->
  <g transform="translate(256 256) rotate(25)">
    <ellipse cx="0" cy="0" rx="190" ry="95" class="cyan" stroke-width="4" />
  </g>
  <g transform="translate(256 256) rotate(-25)">
    <ellipse cx="0" cy="0" rx="190" ry="95" class="blue" stroke-width="4" />
  </g>
  <!-- nodes -->
  <circle cx="424" cy="288" r="10" fill="#22D3EE" />
  <circle cx="424" cy="288" r="18" class="cyan" stroke-width="3" />
  <circle cx="356" cy="401" r="10" fill="#E5E7EB" />
  <circle cx="356" cy="401" r="18" class="white" stroke-width="3" />
  <!-- center -->
  <circle cx="256" cy="256" r="18" class="white" stroke-width="3" />
  <circle cx="256" cy="256" r="10" class="cyan" stroke-width="3" />
  <circle cx="256" cy="256" r="5" fill="#E5E7EB" />
  <!-- wordmark -->
  <text x="256" y="360" text-anchor="middle" class="txt">COSMO</text>
</svg>
