name: Publish to PyPI / TestPyPI

on:
  push:
    tags:
      - "v*"        # triggers on version tags, e.g. v0.1.0

jobs:

  build:
    name: Build distributions
    runs-on: ubuntu-latest

    outputs:
      sdist_path: ${{ steps.build.outputs.sdist_path }}
      wheel_path: ${{ steps.build.outputs.wheel_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        id: build
        run: |
          python -m build
          echo "sdist_path=$(ls dist/*.tar.gz)" >> $GITHUB_OUTPUT
          echo "wheel_path=$(ls dist/*.whl)" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    name: Publish to PyPI (manual approval)
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi-release
      url: https://pypi.org/p/cosmo

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}