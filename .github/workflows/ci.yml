name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal deps for the two CLI scripts and tests:
          python -m pip install pytest numpy pandas pillow matplotlib

      - name: Run smoke tests
        env:
          MPLBACKEND: Agg
        run: |
          pytest -q