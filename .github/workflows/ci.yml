name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          # Editable install with dev extras (pytest, ruff, pre-commit)
          python -m pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check .

      # Optional but recommended: verifies console scripts + dispatch without launching GUI.
      # NOTE: calling plain `cosmo` (no args) attempts to start the GUI by default. [2](https://risecloud-my.sharepoint.com/personal/anders_thorsen_ri_se/Documents/Microsoft%20Copilot%20Chat%20Files/main.py)
      - name: CLI sanity check (no GUI)
        run: |
          cosmo --version
          cosmo convert --help
          cosmo calibrate --help

      # Run smoke tests first for fast feedback, then run the rest (skip smoke).
      - name: Run smoke tests (CLI / entrypoints)
        env:
          MPLBACKEND: Agg
        run: pytest -q -m smoke

      - name: Run full test suite (skip smoke)
        env:
          MPLBACKEND: Agg
        run: pytest -q -m "not smoke"

      - name: Build wheel/sdist
        run: |
          python -m pip install build
          python -m build
          ls -la dist
          